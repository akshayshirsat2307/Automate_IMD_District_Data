name: IMD Daily Rainfall Update

# ============================================================
# RUN SCHEDULE
# ============================================================

on:

  schedule:

    # Runs every day at 03:30 UTC
    # = 10:00 AM IST
    - cron: "30 4 * * *"

  # Allows manual execution from GitHub Actions
  workflow_dispatch:


# ============================================================
# PERMISSIONS
# ============================================================

permissions:

  contents: write


# ============================================================
# JOB
# ============================================================

jobs:

  update:

    runs-on: ubuntu-latest


    steps:


      # ======================================================
      # CHECKOUT REPOSITORY
      # ======================================================

      - name: Checkout Repository

        uses: actions/checkout@v4

        with:

          fetch-depth: 0

          persist-credentials: true


      # ======================================================
      # SETUP PYTHON
      # ======================================================

      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.11"


      # ======================================================
      # INSTALL SYSTEM DEPENDENCIES
      # Required by Camelot / PDF processing
      # ======================================================

      - name: Install System Packages

        run: |

          sudo apt-get update

          sudo apt-get install -y \
            ghostscript \
            python3-tk \
            libgl1


      # ======================================================
      # INSTALL PYTHON DEPENDENCIES
      # ======================================================

      - name: Install Python Dependencies

        run: |

          python -m pip install --upgrade pip

          python -m pip install -r requirements.txt


      # ======================================================
      # SHOW REPOSITORY STRUCTURE
      # ======================================================

      - name: Show Repository Structure

        run: |

          echo "=========================================="

          echo "CURRENT DIRECTORY"

          echo "=========================================="

          pwd


          echo "=========================================="

          echo "REPOSITORY FILES"

          echo "=========================================="

          ls -R


      # ======================================================
      # RUN IMD DAILY SCRIPT
      #
      # The Python script will:
      #
      # 1. Download State PDF
      # 2. Download District PDF
      # 3. Convert District PDF → CSV
      # 4. Convert State PDF → CSV
      # 5. Read master.csv
      # 6. Fetch rainfall data
      # 7. Create updated master CSV
      # 8. Create unmatched CSV
      #
      # All output goes to downloads/
      # ======================================================

      - name: Run IMD Daily Rainfall Script

        run: |

          python download_imd_district_daily.py \
            --main-csv master.csv \
            --out-dir downloads


      # ======================================================
      # SHOW GENERATED FILES
      # ======================================================

      - name: Show Generated Files

        run: |

          echo "=========================================="

          echo "FILES GENERATED IN DOWNLOADS"

          echo "=========================================="

          find downloads -maxdepth 1 -type f -print


          echo ""

          echo "=========================================="

          echo "FILE DETAILS"

          echo "=========================================="


          ls -lh downloads/


      # ======================================================
      # CHECK GIT STATUS
      # ======================================================

      - name: Check Git Status

        run: |

          echo "=========================================="

          echo "GIT STATUS"

          echo "=========================================="


          git status --short


      # ======================================================
      # COMMIT GENERATED FILES
      # ======================================================

      - name: Commit Generated Files

        run: |

          echo "=========================================="

          echo "CONFIGURE GIT"

          echo "=========================================="


          git config user.name "github-actions[bot]"

          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"


          echo "=========================================="

          echo "ADD DOWNLOAD FILES"

          echo "=========================================="


          git add downloads/


          echo "=========================================="

          echo "STAGED FILES"

          echo "=========================================="


          git status --short


          # --------------------------------------------------
          # CHECK IF THERE ARE CHANGES
          # --------------------------------------------------

          if git diff --cached --quiet; then

            echo "No new files to commit."

            exit 0

          fi


          # --------------------------------------------------
          # COMMIT
          # --------------------------------------------------

          git commit \
            -m "Daily IMD Rainfall Update $(date +'%Y-%m-%d')"


          # --------------------------------------------------
          # GET LATEST REMOTE CHANGES
          # --------------------------------------------------

          echo "Fetching latest remote changes..."


          git fetch origin main


          # --------------------------------------------------
          # REBASE
          # --------------------------------------------------

          echo "Rebasing local commit..."


          git rebase origin/main


          # --------------------------------------------------
          # PUSH
          # --------------------------------------------------

          echo "Pushing changes..."


          git push origin HEAD:main


      # ======================================================
      # UPLOAD ARTIFACT
      #
      # This keeps a downloadable copy in GitHub Actions
      # for 30 days.
      # ======================================================

      - name: Upload Daily IMD Files

        uses: actions/upload-artifact@v4

        with:

          name: IMD-Daily-Rainfall-${{ github.run_number }}

          path: downloads/

          retention-days: 30
