name: IMD Daily Rainfall Update

on:
  schedule:
    # Runs at 03:30 UTC = ~09:00 AM IST daily. Adjust as needed.
    - cron: "30 3 * * *"
  workflow_dispatch: {}   # allows manual trigger from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit the output CSV back

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        # run: pip install requests pdfplumber pandas
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run IMD rainfall update script
        run: python download_imd_district_daily.py --main-csv master.csv --out-dir output

      - name: Commit Downloaded Files
        run: |
      
          echo "=========================================="
          echo "CONFIGURE GIT"
          echo "=========================================="
      
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      
      
          echo "=========================================="
          echo "CURRENT GIT STATUS"
          echo "=========================================="
      
          git status --short
      
      
          echo "=========================================="
          echo "ADD DOWNLOAD FILES"
          echo "=========================================="
      
          git add downloads/
      
      
          echo "=========================================="
          echo "STAGED FILES"
          echo "=========================================="
      
          git status --short
      
      
          if git diff --cached --quiet; then
            echo "No new files to commit."
            exit 0
          fi
      
      
          echo "=========================================="
          echo "COMMIT FILES"
          echo "=========================================="
      
          git commit -m "Daily IMD Update $(date +'%Y-%m-%d')"
      
      
          echo "=========================================="
          echo "GET LATEST REMOTE CHANGES"
          echo "=========================================="
      
          git fetch origin main
      
      
          echo "=========================================="
          echo "REBASE LOCAL COMMIT ON LATEST MAIN"
          echo "=========================================="
      
          git rebase origin/main
      
      
          echo "=========================================="
          echo "PUSH TO GITHUB"
          echo "=========================================="
      
          git push origin HEAD:main
